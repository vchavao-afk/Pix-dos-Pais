
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIX dos Pais</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    margin:0;
    padding:20px;
}
.container{
    max-width:700px;
    margin:auto;
}
h1{
    text-align:center;
}
.card{
    background:white;
    border-radius:14px;
    padding:20px;
    margin:15px 0;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}
.nome{font-size:22px;font-weight:bold;}
.chave{
    margin:12px 0;
    font-size:20px;
    word-break:break-all;
}
button{
    border:none;
    border-radius:8px;
    padding:12px 18px;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>
<body>
<div class="container">
<h1>💳 Chaves PIX dos Pais</h1>

<div class="card">
<div class="nome">🔑 Laís Ethiara Scherer</div>
<div class="chave" id="lais">45991548899</div>
<button onclick="copiar('lais')">Copiar Chave PIX</button>
</div>

<div class="card">
<div class="nome">🔑 Augusto Chaves Santos</div>
<div class="chave" id="augusto">45991218898</div>
<button onclick="copiar('augusto')">Copiar Chave PIX</button>
</div>
</div>

<script>
function copiar(id){
 const texto=document.getElementById(id).innerText;
 navigator.clipboard.writeText(texto);
 alert('Chave copiada com sucesso!');
}
</script>
</body>
</html>
